name: 🐛 Bug Report
description: Report something that's broken or not working as expected in AppealDesk
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this! Fill in the fields below — only the starred ones are required.

  - type: textarea
    id: description
    attributes:
      label: "What happened? *"
      description: Describe what went wrong in plain language.
      placeholder: "Example: When I click Save on a proceeding, nothing happens and the page shows a red error."
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: "Affected area(s) *"
      description: Select every area where the issue occurs. You can pick more than one.
      multiple: true
      options:
        - "Platform Portal — Dashboard"
        - "Platform Portal — Service Providers (CA Firms)"
        - "Platform Portal — Users"
        - "Platform Portal — Admins"
        - "Platform Portal — Masters (Acts / Financial Years / Assessment Years)"
        - "Platform Portal — Documents"
        - "Platform Portal — Audit Logs"
        - "Platform Portal — Settings & Branding"
        - "SP Portal — Dashboard"
        - "SP Portal — Litigations / Appeals (List)"
        - "SP Portal — Litigation Detail (Proceedings & Events)"
        - "SP Portal — Demand / Amount Section"
        - "SP Portal — Clients"
        - "SP Portal — Team Users"
        - "SP Portal — Client Users"
        - "SP Portal — Documents (Forms / Templates / Resources)"
        - "SP Portal — Masters"
        - "SP Portal — Audit Logs"
        - "SP Portal — Settings"
        - "Authentication / Login / Invite / Password Reset"
        - "Document Export (PDF / DOCX / XLSX)"
        - "File Uploads / Storage"
        - "Email Notifications"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      description: Describe what should have happened instead.
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: How severe is this?
      options:
        - Critical — completely blocks my work
        - High — a key feature is broken
        - Medium — partially broken, I can work around it
        - Low — minor or cosmetic issue
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Screenshots or error messages
      description: Attach a screenshot or paste any error text you see on screen.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Anything else?
      description: Any other details that might help — which client/litigation it happened on, time of day, etc.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Quick check
      options:
        - label: I searched existing issues to make sure this isn't already reported
          required: false
