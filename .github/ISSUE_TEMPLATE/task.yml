name: 📋 Task
description: A general task, chore, or piece of work to track (refactor, config change, cleanup, etc.)
title: "[Task]: "
labels: ["task"]
body:
  - type: textarea
    id: description
    attributes:
      label: What needs to be done?
      description: Describe the task clearly.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know this task is complete?
      placeholder: |
        - [ ] RLS policy updated for litigation table
        - [ ] Tested locally with two roles (SP + Platform admin)
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Affected area(s)
      description: Select every area this task touches. You can pick more than one.
      multiple: true
      options:
        - "Platform Portal — Dashboard"
        - "Platform Portal — Service Providers (CA Firms)"
        - "Platform Portal — Users"
        - "Platform Portal — Admins"
        - "Platform Portal — Masters (Acts / Financial Years / Assessment Years)"
        - "Platform Portal — Documents"
        - "Platform Portal — Audit Logs"
        - "Platform Portal — Settings & Branding"
        - "SP Portal — Dashboard"
        - "SP Portal — Litigations / Appeals (List)"
        - "SP Portal — Litigation Detail (Proceedings & Events)"
        - "SP Portal — Demand / Amount Section"
        - "SP Portal — Clients"
        - "SP Portal — Team Users"
        - "SP Portal — Client Users"
        - "SP Portal — Documents (Forms / Templates / Resources)"
        - "SP Portal — Masters"
        - "SP Portal — Audit Logs"
        - "SP Portal — Settings"
        - "Authentication / Login / Invite / Password Reset"
        - "Document Export (PDF / DOCX / XLSX)"
        - "File Uploads / Storage"
        - "Email Notifications"
        - "DevOps / Config / Deployment"
        - "Other"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
    validations:
      required: false
