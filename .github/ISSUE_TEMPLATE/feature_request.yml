name: ✨ Feature Request
description: Suggest a new feature or improvement for AppealDesk
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Great! Fill in the fields below — only the starred ones are required.

  - type: textarea
    id: problem
    attributes:
      label: "What problem does this solve? *"
      description: Describe the gap or pain point in plain language.
      placeholder: "Example: I can't see all the proceedings for a client in one place — I have to open each litigation separately."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: "Proposed solution *"
      description: Describe what you'd like to see built or changed.
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: "Affected area(s) *"
      description: Select every area this feature would touch. You can pick more than one.
      multiple: true
      options:
        - "Platform Portal — Dashboard"
        - "Platform Portal — Service Providers (CA Firms)"
        - "Platform Portal — Users"
        - "Platform Portal — Admins"
        - "Platform Portal — Masters (Acts / Financial Years / Assessment Years)"
        - "Platform Portal — Documents"
        - "Platform Portal — Audit Logs"
        - "Platform Portal — Settings & Branding"
        - "SP Portal — Dashboard"
        - "SP Portal — Litigations / Appeals (List)"
        - "SP Portal — Litigation Detail (Proceedings & Events)"
        - "SP Portal — Demand / Amount Section"
        - "SP Portal — Clients"
        - "SP Portal — Team Users"
        - "SP Portal — Client Users"
        - "SP Portal — Documents (Forms / Templates / Resources)"
        - "SP Portal — Masters"
        - "SP Portal — Audit Logs"
        - "SP Portal — Settings"
        - "Authentication / Login / Invite / Password Reset"
        - "Document Export (PDF / DOCX / XLSX)"
        - "File Uploads / Storage"
        - "Email Notifications"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Any alternatives or workarounds you've tried?
      description: Optional — share anything you currently do instead.
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - High — blocking my workflow, needed soon
        - Medium — would meaningfully improve things
        - Low — nice to have
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, screenshots, or links to similar features elsewhere are very welcome.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Quick check
      options:
        - label: I searched existing issues to make sure this hasn't been requested before
          required: false
